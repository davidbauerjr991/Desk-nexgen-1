<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello world project</title>
    <script>
      // Restore path encoded by 404.html (GitHub Pages deep-link redirect).
      // e.g. /Desk-nexgen-1/?p=%2Flogin  →  /Desk-nexgen-1/login
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get("p");
        if (p) {
          var h = params.get("h") || "";
          params.delete("p");
          params.delete("h");
          var qs = params.toString();
          // Derive the repo base from the current pathname (e.g. "/Desk-nexgen-1/")
          // so we don't hard-code it and it works on any host.
          var base = window.location.pathname.replace(/\/$/, "");
          window.history.replaceState(
            null, null,
            base + p + (qs ? "?" + qs : "") + h
          );
        }
      })();
    </script>
